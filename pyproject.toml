[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "ophyd-epicsrs"
version = "0.4.1"
requires-python = ">=3.8"
dependencies = ["ophyd @ git+https://github.com/physwkim/ophyd.git@feature/epicsrs-backend"]

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "ophyd_epicsrs._native"
manifest-path = "crates/ophyd-epicsrs/Cargo.toml"
python-source = "python"
