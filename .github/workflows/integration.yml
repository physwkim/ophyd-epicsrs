name: Integration

# Run the live integration suite against a fresh build of the
# mini-beamline IOC from epics-rs. Heavyweight (~5 min cold, ~1 min
# warm with cargo cache) so this is gated on main pushes + a nightly
# schedule, plus manual dispatch. PRs do not trigger this workflow —
# the unit-test suite (release.yml) covers PR feedback.
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 5 * * *'   # nightly 05:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mini-beamline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout ophyd-epicsrs
        uses: actions/checkout@v4

      - name: Checkout epics-rs (mini-beamline IOC source)
        uses: actions/checkout@v4
        with:
          repository: epics-rs/epics-rs
          path: epics-rs
          # Track main HEAD; bump explicitly here if a regression in
          # epics-rs main starts breaking us and we need to pin.
          ref: main
          fetch-depth: 1

      - name: Setup Rust
        # No `toolchain` pin — track stable so transitive deps that
        # bump their MSRV don't break us out of nowhere. Cargo.toml's
        # rust-version = "1.88" still rejects too-old local toolchains.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + epics-rs target dir
        uses: actions/cache@v4
        with:
          # Two caches share the same key family:
          #  - the user-wide cargo registry (rarely changes)
          #  - the epics-rs target/ (changes when epics-rs main moves)
          # Lockfile-keyed so cache invalidates on dependency bumps.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            epics-rs/target
          key: epics-rs-mini-beamline-${{ runner.os }}-${{ hashFiles('epics-rs/Cargo.lock') }}
          restore-keys: |
            epics-rs-mini-beamline-${{ runner.os }}-

      - name: Build mini-beamline IOC
        working-directory: epics-rs
        run: cargo build --release -p mini-beamline --features ioc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ophyd-epicsrs (editable, via maturin develop)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip maturin
          # Install runtime + test deps (pinned to whatever
          # pyproject.toml declares). The ophyd-async detector tests
          # need the optional 'test' extras.
          pip install -e '.[test]'
          maturin develop --release

      - name: Start mini-beamline IOC in the background
        working-directory: epics-rs
        env:
          # Server side: bind only on loopback so the IOC's CA/PVA
          # services don't pick up stray broadcast addresses from the
          # runner.
          EPICS_CAS_INTF_ADDR_LIST: 127.0.0.1
          EPICS_CAS_BEACON_ADDR_LIST: 127.0.0.1
          # Client side: the readiness probe below runs a Python CA
          # client in this same step, so it needs the same loopback
          # search list as the integration-tests step. Without these
          # the client default is AUTO_ADDR_LIST=YES → broadcasts on
          # eth0 which the loopback-bound IOC never sees, and the
          # probe times out after 30 s.
          EPICS_CA_ADDR_LIST: 127.0.0.1
          EPICS_CA_AUTO_ADDR_LIST: 'NO'
          EPICS_PVA_ADDR_LIST: 127.0.0.1
          EPICS_PVA_AUTO_ADDR_LIST: 'NO'
        run: |
          # `iocsh()` at the end of st.cmd reads from stdin. In CI we
          # have no TTY, so without intervention the IOC sees EOF the
          # moment iocsh tries to read — it exits right after the
          # `CA server: UDP search on port 5064 ...` line and the
          # readiness probe below times out at 30 s with no IOC to
          # talk to. `nohup` only suppresses SIGHUP; it does NOT
          # supply a stdin. `tail -f /dev/null | ...` pipes a stream
          # that never ends so iocsh blocks instead of exiting.
          tail -f /dev/null \
            | ./target/release/mini_ioc examples/mini-beamline/ioc/st.cmd \
              > /tmp/mini_ioc.log 2>&1 &
          IOC_PID=$!
          echo "$IOC_PID" > /tmp/mini_ioc.pid

          # Quick liveness check: if the IOC died despite the stdin
          # workaround (e.g. binary missing, port conflict, panic at
          # init), surface that immediately rather than waiting out
          # the 30 s probe timeout.
          sleep 2
          if ! kill -0 "$IOC_PID" 2>/dev/null; then
            echo "::error::IOC process $IOC_PID exited within 2 s of launch"
            echo "--- last 80 lines of /tmp/mini_ioc.log ---"
            tail -80 /tmp/mini_ioc.log
            exit 1
          fi

          # Wait until the IOC is actually serving — poll mini:current
          # via our own native client, since that's what tests will use.
          # Hard cap at 30 s so a wedged IOC fails the job loudly
          # rather than burning the timeout-minutes budget.
          cd "${GITHUB_WORKSPACE}"
          . .venv/bin/activate
          python - <<'PY'
          import time
          from ophyd_epicsrs._native import EpicsRsContext
          ctx = EpicsRsContext()
          pv = ctx.create_pv('mini:current')
          deadline = time.time() + 30
          while time.time() < deadline:
              if pv.wait_for_connection(timeout=2.0):
                  print('IOC ready, mini:current =', pv.get_with_metadata(timeout=2.0)['value'])
                  raise SystemExit(0)
          raise SystemExit('IOC did not become ready within 30s')
          PY

      - name: Run integration tests
        env:
          EPICS_CA_ADDR_LIST: 127.0.0.1
          EPICS_CA_AUTO_ADDR_LIST: NO
          EPICS_PVA_ADDR_LIST: 127.0.0.1
          EPICS_PVA_AUTO_ADDR_LIST: NO
        run: |
          . .venv/bin/activate
          pytest tests/integration/ -v -s --tb=short

      - name: Stop mini-beamline IOC
        if: always()
        run: |
          if [ -f /tmp/mini_ioc.pid ]; then
            kill "$(cat /tmp/mini_ioc.pid)" 2>/dev/null || true
            sleep 1
            kill -9 "$(cat /tmp/mini_ioc.pid)" 2>/dev/null || true
          fi

      - name: Upload IOC log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mini-ioc-log
          path: /tmp/mini_ioc.log
          if-no-files-found: ignore
